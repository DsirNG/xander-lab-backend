version: '3.8'

services:
  xander-lab-backend:
    env_file:
      - .env.local
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xander-lab-backend
    restart: unless-stopped
    ports:
      - "30002:30002"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JAVA_OPTS=-Xms512m -Xmx512m
      # 数据库配置
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      # Redis 配置
      - SPRING_REDIS_HOST=${SPRING_REDIS_HOST}
      - SPRING_REDIS_PORT=${SPRING_REDIS_PORT:-6379}
      - SPRING_REDIS_PASSWORD=${SPRING_REDIS_PASSWORD:-}
      - SPRING_REDIS_DATABASE=${SPRING_REDIS_DATABASE:-0}
      # 邮件配置
      - RESEND_API_KEY=${RESEND_API_KEY}
      - MAIL_FROM=${MAIL_FROM}
      # 阿里云 OSS 配置
      - ALIYUN_OSS_ACCESS_KEY_ID=${ALIYUN_OSS_ACCESS_KEY_ID}
      - ALIYUN_OSS_ACCESS_KEY_SECRET=${ALIYUN_OSS_ACCESS_KEY_SECRET}
      # JWT 配置
      - JWT_SECRET=${JWT_SECRET}
      # MCP 博客发布配置
      - MCP_BLOG_ENABLED=${MCP_BLOG_ENABLED:-false}
      - MCP_SERVER_TOKEN=${MCP_SERVER_TOKEN:-}
      - MCP_CREDENTIAL_ENCRYPTION_KEY=${MCP_CREDENTIAL_ENCRYPTION_KEY:-}
      - MCP_PUBLIC_BASE_URL=${MCP_PUBLIC_BASE_URL:-http://localhost:30002}
    networks:
      - xander-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:30002/api/blog/posts/recent"]

      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "com.xander-lab.description=Xander Lab Backend Application"
      - "com.xander-lab.version=1.0.0"

networks:
  xander-network:
    driver: bridge
